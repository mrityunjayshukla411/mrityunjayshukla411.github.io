<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css">
    <title>Headphoenix</title>
  </head>
  <body>
    <!-- <h1>Hello, world!</h1> -->
    <section id="title">
        <div class="container-fluid">
          <!-- Nav Bar -->
    
          <nav class="navbar navbar-expand-lg navbar-dark s">
            <a class="navbar-brand" href="#">Headphoenix</a>
            <!-- <div class="container-fluid"> -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
              <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#footer">Contact</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#pricing">Pricing</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#cta">Download</a>
                </li>
              </ul>
            </div>
            <!-- </div> -->
          </nav>
          <!-- Title -->
          <div class="row">
            <div class="col-lg-6">
              <h1 class="big-heading" >Discover the difference between sound and music</h1>
              <button type="button" class="btn btn-dark btn-lg download-button">
                <i class="fab fa-apple"></i> Download
              </button>
              <button type="button" class="btn btn-outline-light btn-lg download-button">
                <i class="fab fa-google-play"></i> Download
              </button>
            </div>
            <div class="col-lg-6">
              <img class="title-img" src="/images/backgroundImg.png" alt="iphone-mockup" />
            </div>
          </div>
        </div>
      </section>

        <section id="features">
            <div class="row">
              <div class="feature-box col-lg-4">
                <i class="fas fa-check-circle fa-4x icon"></i>
                <h3>Easy to use.</h3>
                <p>So easy to use, even your dog could do it.</p>
              </div>
        
              <div class="feature-box col-lg-4">
                <i class="fas fa-bullseye fa-4x icon"></i>
                <h3>Elite Clientele</h3>
                <p>We have all the dogs, the greatest dogs.</p>
              </div>
        
              <div class="feature-box col-lg-4">
                <i class="fas fa-heart fa-4x icon"></i>
                <h3>Guaranteed to work.</h3>
                <p>Find the love of your dog's life or your money back.</p>
              </div>
            </div>
          </section>

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
      crossorigin="anonymous"
    ></script>

    <!-- Option 2: Separate Popper and Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.min.js" integrity="sha384-Atwg2Pkwv9vp0ygtn1JAojH0nYbwNJLPhwyoVbhoPwBhjQPR5VtM2+xf0Uwh9KtT" crossorigin="anonymous"></script>
    -->
  </body>
</html>
